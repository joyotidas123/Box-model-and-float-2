<!DOCTYPE html>
<html>
    <head>
        <style>
            #Right{
                float: right;
            }
            #Left {
                float: left;
            }
        </style>
    </head>
    <body>
    
        <h2>Float</h2>

        <p>In this example, the image will float to the right in the paragraph,
            and the text in the paragraph will wrap around the image.</p>

            <p>
                <img id="Right" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTl37Ha8cXj2c-sdAN1bfoPl31dXDgypc55Kw&s"
                alt="nature" style="width: 190px;height: 190px;">
                <img id="Left" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLKcOgEmGQZH_rEReAGnFnCB82nPhld2G9TA&s"
                alt="nature" style="width:190px;height: 190px;">
                <center>This is a dummy content used to understand float
                 property</center>
            </p>
    </body>
</html>
